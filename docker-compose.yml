# VEDA platform — DEV compose (migration_plan.md §3 topology, Phase 1).
#
# Application services on one internal network (veda_net); nginx is the only
# one meant to be reached from outside docker. Three callouts encoded here:
#   • Split Redis (§3): redis-broker (unbounded, no evict) and redis-cache
#     (maxmemory + allkeys-lru) are SEPARATE instances even in dev, so the shape
#     matches prod. Dev may point both Django aliases at one — but the two
#     instances stay distinct so a cache-eviction storm never touches the broker.
#     redis-stack is a THIRD, dedicated instance for chatbot/'s LangGraph
#     checkpointer (needs RediSearch, which plain redis:7-alpine lacks) — kept
#     isolated rather than repurposing broker/cache so its memory/latency
#     profile can't couple to Celery or the app cache's LRU eviction.
#   • PgBouncer (§1.1): every app DB pool connects THROUGH pgbouncer:6432, never
#     postgres:5432 directly, so the fleet cannot exceed Postgres max_connections.
#   • redis-stack also publishes :6380 to the host — DEV convenience only, so
#     chat_cli.py/test_manual.py work from bare metal (see chatbot/checkpointer.py).
#
# SLM: ollama is the dev/ingestion backend (§8b); also used here by the api
# tier's chatbot/ supervisor (classify/smalltalk/followup). vLLM is prod-only
# for these query-time calls (see docker-compose.prod.yml).

x-app-env: &app-env
  env_file: [.env]

networks:
  veda_net:
    driver: bridge

volumes:
  pg_data:
  model_cache:      # BGE-M3 / reranker / MiniLM weights (§9), mounted into inference
  ollama_models:
  redis_stack_data:

services:
  postgres:
    image: pgvector/pgvector:pg16
    ports: ["15432:5432"]   # DEV: host access for bare-metal ingestion (writes veda_engine)
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro   # CREATE EXTENSION vector; + internal store DB
    networks: [veda_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:latest
    depends_on: {postgres: {condition: service_healthy}}
    volumes:
      - ./docker/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./docker/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    networks: [veda_net]

  redis-broker:                 # Celery broker+backend ONLY; unbounded, never evicts (§3)
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    networks: [veda_net]

  redis-cache:                  # Django cache + hot indices + rehydrate pub/sub (§3)
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    networks: [veda_net]

  redis-stack:                  # chatbot/'s LangGraph checkpoint store — dedicated
                                 # and isolated from redis-broker/redis-cache. Needs
                                 # RediSearch (FT.* commands), which plain redis:7-alpine
                                 # does not have; redis-stack-server is a superset image
                                 # (same protocol/commands + modules).
    image: redis/redis-stack-server:latest
    ports: ["6380:6379"]        # DEV: bare-metal chat_cli.py/test_manual.py reach it at
                                 # localhost:6380 (matches chatbot/checkpointer.py's default)
    volumes: [redis_stack_data:/data]
    networks: [veda_net]

  ollama:                       # dev/ingestion SLM backend (§8b)
    image: ollama/ollama
    volumes: [ollama_models:/root/.ollama]
    networks: [veda_net]

  # OPTIONAL — round-robin Ollama load balancer across multiple hosts
  # (scripts/ollama_proxy.py, stdlib only). Only needed to actually fan
  # SEMANTIC_PARALLEL_QWEN_ENABLED across >1 Ollama backend. OFF by default
  # (profile: proxy), so a plain `docker compose up` never starts it. To use:
  #   1. set OLLAMA_BACKENDS=http://host1:11434,http://host2:11434,... in .env
  #   2. docker compose --profile proxy up
  #   3. point OLLAMA_URL at http://ollama-proxy:11434 for inference + ingest-worker
  #   4. enable SEMANTIC_PARALLEL_QWEN_ENABLED=1 (+ SEMANTIC_MAX_PARALLEL_REQUESTS)
  ollama-proxy:
    image: python:3.11-slim
    profiles: [proxy]
    command: ["python3", "/app/scripts/ollama_proxy.py", "--port", "11434"]
    environment:
      OLLAMA_BACKENDS: ${OLLAMA_BACKENDS:-}
    volumes:
      - "./scripts:/app/scripts:ro"
    extra_hosts: ["host.docker.internal:host-gateway"]  # reach host-run Ollama backends
    networks: [veda_net]

  api:
    build: {context: ., dockerfile: docker/Dockerfile.api}
    <<: *app-env
    environment:
      ROLE: api
      CHATBOT_CHECKPOINTER_REDIS_URL: redis://redis-stack:6379/0
    volumes: [".:/app"]   # DEV: live code, no rebuild on edit
    depends_on:
      pgbouncer: {condition: service_started}
      redis-broker: {condition: service_started}
      redis-cache: {condition: service_started}
      redis-stack: {condition: service_started}
      ollama: {condition: service_started}   # chatbot's classify/smalltalk/followup SLM calls (dev)
    networks: [veda_net]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build: {context: ., dockerfile: docker/Dockerfile.api}
    <<: *app-env
    environment: {ROLE: worker}
    volumes: [".:/app"]   # DEV: live code
    extra_hosts: ["host.docker.internal:host-gateway"]  # reach launchpad DB on host :5433
    depends_on: [redis-broker, pgbouncer, ollama]
    networks: [veda_net]

  beat:
    build: {context: ., dockerfile: docker/Dockerfile.api}
    <<: *app-env
    environment: {ROLE: beat}
    volumes: [".:/app"]   # DEV: live code
    depends_on: [redis-broker, pgbouncer]
    networks: [veda_net]

  # ML-capable Celery worker for the `ingestion` queue: uses the inference image
  # (torch + Django + celery) because L0 ingestion needs both. cwd=/app so `celery -A
  # config` resolves the Django project; the heavy run_ingestion runs in a subprocess
  # (cwd=veda_core) to isolate the engine's top-level `config` (§4, ingest worker).
  ingest-worker:
    build: {context: ., dockerfile: docker/Dockerfile.inference}
    <<: *app-env
    working_dir: /app
    entrypoint: ["celery", "-A", "config", "worker", "-Q", "ingestion,high", "--concurrency", "1", "--loglevel", "info"]
    environment:
      PYTHONPATH: /app
      HF_HOME: /models/hf_cache
      # Pin the hub cache to the flat model dir explicitly: huggingface_hub >=0.30
      # defaults HF_HUB_CACHE to HF_HOME/hub, but the baked/downloaded weights live
      # directly under /models/hf_cache/models--*, so without this they aren't found
      # offline (LocalEntryNotFoundError).
      HF_HUB_CACHE: /models/hf_cache
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      VEDA_APP_DIR: /app
      # Ingestion SLM → native host Ollama (Apple Metal GPU) instead of the CPU-only
      # dockerized ollama. Docker-on-macOS has no GPU passthrough, so the in-container
      # ollama runs the 7B on CPU (~5–8× slower). Overrides .env OLLAMA_URL for THIS
      # service only; other services keep using the docker `ollama` service.
      OLLAMA_URL: http://host.docker.internal:11434
    volumes:
      - ".:/app"
      - model_cache:/models:ro
    extra_hosts: ["host.docker.internal:host-gateway"]
    depends_on: [redis-broker, pgbouncer, ollama]
    networks: [veda_net]

  inference:
    build: {context: ., dockerfile: docker/Dockerfile.inference}
    <<: *app-env
    working_dir: /app/veda_core     # engine cwd-relative paths (data/, schema/, client_bge) resolve here
    environment:
      WORKERS: ${INFERENCE_WORKERS:-1}   # dev default; prod sizes from measured RSS (§8.1)
      PYTHONPATH: /app                    # so `inference.main` imports from the repo root
      HF_HOME: /models/hf_cache            # offline model cache (BGE / reranker) — matches ingest-worker + Dockerfile default
      # Pin HF_HUB_CACHE to the flat weights dir (same as ingest-worker): huggingface_hub
      # >=0.30 defaults it to HF_HOME/hub, but the offline weights live directly under
      # /models/hf_cache/models--*, so without this the query tier's BGE/reranker cold-load
      # raises LocalEntryNotFoundError under HF_HUB_OFFLINE=1.
      HF_HUB_CACHE: /models/hf_cache
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      # Docker-on-macOS has no GPU passthrough, so the in-container `ollama` runs the 7B
      # SLM on CPU (~5–8× slower → a single SQL-gen call measured 239s). Point the query
      # tier at the host Metal-GPU ollama (model resident in VRAM), same as ingest-worker.
      OLLAMA_URL: http://host.docker.internal:11434
      # Multi-source serving: read the per-source assembled semantic models from redis
      # (veda:sm:{source}:{tenant}) so a scoped/cross-source query uses each source's OWN
      # model (and _merge_scoped_sms for multi-source), instead of the global homzhub file.
      VEDA_SM_REDIS: "1"
    volumes:
      - ".:/app"           # DEV: live code
      - model_cache:/models:ro
    extra_hosts: ["host.docker.internal:host-gateway"]  # reach launchpad DB on host :5433
    depends_on: [pgbouncer, redis-cache, ollama]
    networks: [veda_net]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8001/healthz')"]
      interval: 15s
      timeout: 5s
      retries: 5

  nginx:                        # the ONLY service that maps a host port (§3)
    image: nginx:alpine
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      # nginx serves /static/ from here (alias /app/staticfiles/); the api's
      # collectstatic writes into this same repo dir (bind-mounted at /app).
      - ./staticfiles:/app/staticfiles:ro
    ports: ["8080:80"]
    depends_on: [api]
    networks: [veda_net]
