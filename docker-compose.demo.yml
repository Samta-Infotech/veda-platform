# VEDA Platform — QUERY-ONLY DEMO override.
#
# Runs the query layer against a DUMP of pre-ingested data + models. NO ingestion:
# worker / beat / ingest-worker / vllm are never started. Applied on top of the dev
# base (which bind-mounts .:/app, so a restored veda_core/data is visible in-container):
#
#   docker compose -f docker-compose.yml -f docker-compose.demo.yml up -d \
#       postgres pgbouncer redis-broker redis-cache ollama inference api
#
# See docs/DEMO_QUERY_ONLY.md. Use scripts/demo/export.sh (on the source PC) and
# scripts/demo/restore.sh (on the demo box) to move the bundle.

services:
  inference:
    environment:
      WORKERS: "1"                          # demo: one warm engine is plenty
      DJANGO_SETTINGS_MODULE: config.settings.dev
      SLM_BACKEND: ollama                   # demo SLM backend (no vLLM/GPU-batching tier)

  api:
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      VEDA_ALLOW_ANONYMOUS: "1"             # demo: hit /api/v1/query with no token
    ports: ["8000:8000"]                    # query the API directly — no nginx/TLS needed

  # GPU (optional): the dev base runs ollama on CPU. If the demo box has an NVIDIA GPU,
  # uncomment to accelerate the SLM + drop query latency substantially.
  # ollama:
  #   deploy:
  #     resources:
  #       reservations:
  #         devices: [{driver: nvidia, count: 1, capabilities: [gpu]}]
