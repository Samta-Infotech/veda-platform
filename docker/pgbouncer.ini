# Transaction-pooling proxy in front of Postgres (migration_plan.md §3, §1.1 callout).
# Every api/worker/inference DB pool connects THROUGH this, not Postgres directly, so
# N workers x M replicas x pool_size cannot exceed Postgres max_connections.

[databases]
; Points at the postgres service/port; DB name comes from POSTGRES_DB (.env.example).
* = host=postgres port=5432

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

; DEV uses plain auth against userlist.txt for simplicity. PROD should use md5/scram
; with hashes generated from the real POSTGRES_USER/POSTGRES_PASSWORD secrets (§9).
auth_type = plain
auth_file = /etc/pgbouncer/userlist.txt

; Transaction pooling: a server connection is only bound to a client for the duration
; of one transaction. This is what lets a small Postgres max_connections serve a large
; fleet of api/worker/inference pools without exhaustion.
pool_mode = transaction

max_client_conn = 1000
default_pool_size = 20
reserve_pool_size = 5

; pg16 supports prepared statements under transaction pooling only via this mode —
; keep it on so ORM/psycopg prepared-statement usage stays compatible (§3 callout).
max_prepared_statements = 200

admin_users = pgbouncer_admin
