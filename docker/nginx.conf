# Single ingress (migration_plan.md §3): nginx is the only service that publishes a host
# port. TLS termination, reverse proxy to `api`, upload size limits, rate limiting. This
# is a dev/template stub — replace the self-signed cert paths with real certs in prod.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Rate limiting: bucket by client IP, burst absorbed via nodelay-free queue.
    limit_req_zone $binary_remote_addr zone=veda_api:10m rate=10r/s;

    # Reject bodies over this size before they ever reach Django (upload size limit).
    client_max_body_size 20m;

    upstream veda_api {
        server api:8000;
    }

    server {
        listen 80;
        server_name _;

        # TLS termination stub — uncomment and point at real certs in production.
        # listen 443 ssl;
        # ssl_certificate     /etc/nginx/certs/fullchain.pem;
        # ssl_certificate_key /etc/nginx/certs/privkey.pem;

        location /healthz {
            proxy_pass http://veda_api/healthz;
            # Forward a valid Host — the upstream name "veda_api" has an underscore,
            # which Django rejects as an invalid HTTP_HOST (RFC 1034) even with ALLOWED_HOSTS=['*'].
            proxy_set_header Host $host;
        }

        location /static/ {
            alias /app/staticfiles/;
        }

        location / {
            limit_req zone=veda_api burst=20 nodelay;

            proxy_pass http://veda_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
        }
    }
}
