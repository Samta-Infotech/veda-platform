# VEDA platform — PROD override (migration_plan.md §7.4). Apply with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# What prod hardens (§7.4, §3):
#   • Split Redis stays two DISTINCT instances (never two DBs on one process).
#   • vLLM is the query-time SLM backend (§8b); ollama stays for ingestion/worker.
#   • GPU reserved on inference + vllm + ollama only; api/worker load NO models.
#   • Docker secrets (not env plaintext); TLS at nginx; DEBUG off.
#   • Resource limits + restart policies; healthchecks gate rollout.
#   • Inference WORKERS sized from MEASURED per-worker RSS, not CPU (§8.1).

secrets:
  postgres_password: {external: true}
  django_secret_key: {external: true}

services:
  postgres:
    restart: always
    deploy: {resources: {limits: {memory: 4g}}}

  redis-cache:
    restart: always
    command: ["redis-server", "--maxmemory", "2gb", "--maxmemory-policy", "allkeys-lru"]

  redis-broker:
    restart: always
    # unbounded / never evicts — a full broker must fail loud, not silently drop jobs.
    command: ["redis-server", "--save", "", "--appendonly", "yes"]

  redis-stack:
    restart: always
    # RDB snapshots only (image default), no AOF: this Redis holds LangGraph
    # conversation checkpoints, NOT the source of truth — Django's ChatMessage/
    # ChatSession tables are. Losing recent checkpoints on a hard crash degrades
    # a few in-flight conversations to "no prior context" on their next turn
    # (self-healing, refuse-over-guess-consistent), not a correctness bug. AOF
    # would add write-path latency and RediSearch-index-replay risk for a
    # durability guarantee this data doesn't need.

  vllm:                          # PROD query-time SLM backend (§3, §8b)
    image: vllm/vllm-openai:latest
    command: ["--model", "${SLM_MODEL_NAME}"]
    volumes: [model_cache:/models]
    networks: [veda_net]
    restart: always
    deploy:
      resources:
        reservations:
          devices: [{driver: nvidia, count: 1, capabilities: [gpu]}]

  ollama:
    restart: always
    deploy:
      resources:
        reservations:
          devices: [{driver: nvidia, count: 1, capabilities: [gpu]}]

  api:
    restart: always
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DEBUG: "0"
      SLM_BACKEND: vllm             # chatbot/'s classify/smalltalk/followup calls (§8b) —
      VLLM_URL: http://vllm:8000/v1 # matches inference's own prod backend, NOT ollama
                                     # (ollama stays worker/ingestion-only, see worker below)
    secrets: [postgres_password, django_secret_key]
    deploy: {replicas: 3, resources: {limits: {memory: 1g}}}

  worker:
    restart: always
    environment: {DJANGO_SETTINGS_MODULE: config.settings.prod, SLM_BACKEND: ollama}
    secrets: [postgres_password, django_secret_key]

  beat:
    restart: always
    environment: {DJANGO_SETTINGS_MODULE: config.settings.prod}
    secrets: [postgres_password, django_secret_key]

  inference:
    restart: always
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      SLM_BACKEND: vllm            # query hot path → vLLM continuous batching (§8b)
      VLLM_URL: http://vllm:8000/v1
      WORKERS: ${INFERENCE_WORKERS}   # REQUIRED in prod — measured RSS, not CPU (§8.1)
    depends_on: [vllm]
    deploy:
      replicas: 2
      resources:
        reservations:
          devices: [{driver: nvidia, count: 1, capabilities: [gpu]}]

  nginx:
    restart: always
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/certs:/etc/nginx/certs:ro   # TLS material (§7.4)
    ports: ["443:443", "80:80"]
