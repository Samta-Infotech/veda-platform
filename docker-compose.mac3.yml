# Mac mini 3 (application host) — query stack that OFFLOADS the SLM to mini 1 (Ollama)
# and BGE to mini 2 (metal_embed_server). Apply ON TOP OF the dev base:
#
#   COMPOSE="docker compose -f docker-compose.yml -f docker-compose.mac3.yml"
#   $COMPOSE up -d postgres pgbouncer redis-broker redis-cache      # infra first
#   $COMPOSE up -d --no-deps inference api                          # then the app (no ollama)
#
# Requires in .env (LAN IPs, NOT host.docker.internal — mini 1/2 are separate machines):
#   OLLAMA_URL=http://<mini1-ip>:11434
#   METAL_EMBED_URL=http://<mini2-ip>:11435
#
# NOT started here: ollama, vllm, worker, beat, ingest-worker, nginx.

services:
  inference:
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      WORKERS: ${INFERENCE_WORKERS:-1}
      SLM_BACKEND: ollama
      # OVERRIDE the base compose's hardcoded host.docker.internal:11434 — mini 1 is a
      # DIFFERENT machine, so the SLM URL must come from .env (its LAN IP).
      OLLAMA_URL: ${OLLAMA_URL:?set OLLAMA_URL to the mini-1 LAN IP in .env}
      METAL_EMBED_URL: ${METAL_EMBED_URL:?set METAL_EMBED_URL to the mini-2 LAN IP in .env}
      METAL_EMBED_TIMEOUT: ${METAL_EMBED_TIMEOUT:-60}
    depends_on: [pgbouncer, redis-cache]   # drop the local `ollama` dep (external on mini 1)

  api:
    environment:
      ROLE: api
      DJANGO_SETTINGS_MODULE: config.settings.dev
      VEDA_ALLOW_ANONYMOUS: "1"            # demo: query without a token
    ports: ["8000:8000"]                   # hit the API directly; add nginx later if wanted
